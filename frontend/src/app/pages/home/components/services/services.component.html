<section class='w-100 m-0'>
    <!-- Title -->
    <ng-container *ngIf="page$ | async as page">
        <h1 class="section-title" [innerHTML]="pageService.getSafeHtml(page, 'serviceText')"></h1>
        <h1 class="section-title-mobile" [innerHTML]="pageService.getSafeHtml(page, 'serviceText')"></h1>
    </ng-container>
    <!-- Service cards -->
    <app-service-card></app-service-card>
    <!-- Footer -->
    <div class="footer-button-wrapper" [routerLink]="['/services']">
        <button class="footer-button">
            {{ 'service.learn-more' | translate }}
            <i class="bi bi-arrow-right-short"></i>
        </button>
    </div>
    <span class="separator"></span>
</section>
