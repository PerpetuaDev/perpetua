<div id="aboutUs" class='w-100 m-0'>
    <!-- Header -->
    <section class="header-section">
        <ng-container *ngIf="page$ | async as page">
            <p class="header-text" [innerHTML]="pageService.getSafeHtml(page, 'aboutHeaderText1')"></p>
            <p class="header-text" [innerHTML]="pageService.getSafeHtml(page, 'aboutHeaderText2')"></p>
        </ng-container>
    </section>
    <!-- Location -->
    <section id="aboutLocations" class="location-section">
        <h1>{{ 'contact.nav.locations' | translate }}</h1>
        <menu>
            <li *ngFor="let office of (offices$ | async)" class="location-button"
                [routerLink]="['/about', office.documentId]">
                {{ office.office_location }}
                <i class="bi bi-arrow-up-short menu-icon"></i>
            </li>
        </menu>
        <div class="row row-cols-2 row-cols-md-2 g-4">
            <div *ngFor="let office of (offices$ | async)" class="col">
                <app-location-card [office]="office"></app-location-card>
            </div>
        </div>
    </section>
    <div class="contact-button-wrapper">
        <button class="contact-button" routerLink="/contact">
            {{ 'contact.nav.us' | translate }}
            <i class="bi bi-arrow-right-short contact-icon"></i>
        </button>
    </div>
    <!-- Clients -->
    <section id="aboutClients" class="client-section">
        <h1 class="sub-title">{{ 'clients.our-clients' | translate }}</h1>
        <app-client-block-about [clients]="clients"></app-client-block-about>
    </section>
    <!-- Team -->
    <!-- <section id="aboutTeam" class="team-section">
        <h1 class="sub-title">{{ 'team.our-team' | translate }}</h1>
        <ng-container *ngIf="members.length > 0">
            <app-staff-card [members]="members"></app-staff-card>
        </ng-container>
        <div class=" footer-button-wrapper" [routerLink]="['/team']">
            <button class="footer-button">
                {{ 'team.all' | translate }}
                <i class="bi bi-arrow-right-short"></i>
            </button>
        </div>
        <span class="separator"></span>
    </section> -->
    <!-- Careers -->
    <section id="aboutCareers" class="careers-section">
        <div class="sub-title-container">
            <h1 class="sub-title">{{ 'contact.nav.career' | translate }}</h1>
            <ng-container *ngIf="page$ | async as page">
                <p [innerHTML]="pageService.getSafeHtml(page, 'aboutCareers')"></p>
            </ng-container>
        </div>
        <ng-container *ngIf="careers.length > 0">
            <app-career-card [careers]="careers"></app-career-card>
        </ng-container>
    </section>
</div>
